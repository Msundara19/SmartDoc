version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartdoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartdoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartdoc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smartdoc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./SmartDoc.Api/Migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartdoc} -d ${POSTGRES_DB:-smartdoc}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
